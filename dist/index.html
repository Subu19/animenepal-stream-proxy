<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeProxy Background Service</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: #1a1a1a;
        color: #f0f0f0;
      }
      h1 {
        color: #4CAF50;
      }
      .status {
        padding: 1rem 2rem;
        background-color: #2a2a2a;
        border-radius: 8px;
        border: 1px solid #333;
        margin-top: 1rem;
        text-align: center;
      }
      .port {
        font-family: monospace;
        font-size: 1.2rem;
        color: #64b5f6;
        background: #222;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>AnimeProxy is Active</h1>

    <div class="status">
      <p>Local proxy server is running in the background.</p>
      <p>Listening on <span class="port">http://127.0.0.1:8080/proxy</span></p>
    </div>

    <p style="opacity: 0.7; font-size: 0.9em; margin-top: 2rem;">
      You can safely minimize this window.
    </p>
  </body>
</html>
